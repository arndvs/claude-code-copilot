name: "Sandcastle CI"

# Validates the vendored Sandcastle engine: dependencies install cleanly against
# the committed lockfile and the TypeScript sources typecheck. Proxy-independent —
# vendored into every Sandcastle install. Runs whenever the engine changes
# (e.g. after `ctrl update-sandcastle` re-vendors it).

on:
  push:
    paths:
      - ".sandcastle/engine/**"
      - ".sandcastle/package.json"
      - ".sandcastle/run.ts"
      - ".github/workflows/sandcastle-ci.yml"
  pull_request:
    paths:
      - ".sandcastle/engine/**"
      - ".sandcastle/package.json"
      - ".sandcastle/run.ts"
      - ".github/workflows/sandcastle-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  engine:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install engine dependencies (frozen)
        run: |
          cd .sandcastle/engine
          pnpm --ignore-workspace install --frozen-lockfile

      - name: Smoke dispatcher module resolution
        run: |
          cd .sandcastle/engine
          set +e
          output="$(pnpm --ignore-workspace exec tsx ../run.ts __smoke__ 2>&1)"
          status=$?
          set -e
          printf '%s\n' "$output"
          if printf '%s\n' "$output" | grep -q "ERR_PACKAGE_PATH_NOT_EXPORTED"; then
            echo "Dispatcher crashed during module resolution."
            exit 1
          fi
          if [[ "$status" -ne 1 ]]; then
            echo "Expected dispatcher smoke to exit 1 for an unknown workflow, got $status."
            exit 1
          fi
          if ! printf '%s\n' "$output" | grep -q 'Unknown workflow: "__smoke__"'; then
            echo "Expected dispatcher smoke to report the unknown workflow."
            exit 1
          fi

      - name: Typecheck engine
        run: |
          cd .sandcastle/engine
          pnpm run typecheck
