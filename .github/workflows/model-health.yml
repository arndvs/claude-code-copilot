name: Model health

# Probes every model alias in litellm_config.yaml through the proxy and flags
# when GitHub Copilot changes availability (e.g. the 'no choices' failure that
# forced the sonnet -> opus-4.8 remap). Keeps the config honest.

on:
  schedule:
    - cron: "0 13 * * *" # daily 13:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  model-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Probe each configured alias through the proxy
        id: probe
        env:
          BASE_URL: ${{ secrets.LITELLM_BASE_URL }}
          AUTH_TOKEN: ${{ secrets.LITELLM_MASTER_KEY }}
        run: |
          set -euo pipefail
          base="${BASE_URL%/}"
          if [ -z "$base" ] || [ -z "${AUTH_TOKEN:-}" ]; then
            echo "::error::LITELLM_BASE_URL / LITELLM_MASTER_KEY are not set on this repo"
            exit 1
          fi

          # All explicit aliases except the '*' wildcard.
          aliases=$(python3 -c "import yaml; d=yaml.safe_load(open('litellm_config.yaml')); print('\n'.join(m['model_name'] for m in d.get('model_list',[]) if m.get('model_name') and m['model_name'] != '*'))")
          # Fail fast: a parse error or missing PyYAML yields an empty list, which
          # would otherwise sail through below as "all healthy" (a false green).
          if [ -z "$(printf '%s' "$aliases" | tr -d '[:space:]')" ]; then
            echo "::error::No aliases extracted from litellm_config.yaml (parse error or empty model_list)"
            exit 1
          fi
          echo "Aliases under test:"; echo "$aliases" | sed 's/^/  /'

          probe_script=".sandcastle/scripts/probe_completion.sh"
          if [ ! -f "$probe_script" ]; then
            echo "::error::Probe script missing: $probe_script"
            exit 1
          fi

          broken=""
          while IFS= read -r m; do
            [ -n "$m" ] || continue
            if ! probe_out=$(
              GITHUB_OUTPUT= PROBE_BASE_URL="$base" PROBE_AUTH_TOKEN="$AUTH_TOKEN" PROBE_MODEL="$m" \
              PROBE_PROMPT="ping" PROBE_RETRY_INTERVAL=4 bash "$probe_script"
            ); then
              echo "  ❌ $m (probe script crashed)"
              broken="$broken $m"
              continue
            fi
            status=$(printf '%s\n' "$probe_out" | sed -n 's/^status=//p')
            detail=$(printf '%s\n' "$probe_out" | sed -n 's/^detail=//p')
            http_code=$(printf '%s\n' "$probe_out" | sed -n 's/^http_code=//p')
            case "$status" in
              ok)
                echo "  ✅ $m"
                ;;
              degraded)
                echo "  ⚠️ $m (HTTP $http_code, $detail)"
                broken="$broken $m"
                ;;
              *)
                echo "  ❌ $m (HTTP $http_code, $detail)"
                broken="$broken $m"
                ;;
            esac
          done <<< "$aliases"

          if [ -n "$broken" ]; then
            { echo "status=fail"; echo "broken=$broken"; } >> "$GITHUB_OUTPUT"
          else
            echo "status=ok" >> "$GITHUB_OUTPUT"
            echo "All configured aliases are healthy."
          fi

      - name: Open or update the model-health issue
        if: steps.probe.outputs.status == 'fail'
        env:
          GH_TOKEN: ${{ github.token }}
          BROKEN: ${{ steps.probe.outputs.broken }}
        run: |
          title="⚠️ Model health: configured alias(es) failing through the proxy"
          existing=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --label model-health \
            --json number --jq '.[0].number // empty' 2>/dev/null || true)
          body=$(printf '%s\n' \
            "These \`litellm_config.yaml\` aliases failed a completion through the proxy at $(date -u +%FT%TZ):" \
            "" \
            "**Failing:**${BROKEN}" \
            "" \
            "Usually means GitHub Copilot changed model availability (the same 'no choices' class that forced the sonnet -> opus-4.8 remap). Update the alias targets in \`litellm_config.yaml\`." \
            "" \
            "Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}")
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$GITHUB_REPOSITORY" --body "$body"
          else
            gh label create model-health --repo "$GITHUB_REPOSITORY" --color FBCA04 \
              --description "Proxy model availability" 2>/dev/null || true
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" --label model-health --body "$body"
          fi

      - name: Mark the job failed
        if: steps.probe.outputs.status == 'fail'
        run: exit 1
