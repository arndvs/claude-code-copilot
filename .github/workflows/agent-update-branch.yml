name: "Agent: Update Branch"

on:
  # pull_request_target rather than pull_request: the standard pull_request
  # trigger depends on a generated merge commit, which GitHub fails to
  # produce when the PR is out-of-date or conflicting — exactly when this
  # workflow needs to run. pull_request_target runs in the base context and
  # does not need the merge commit, so the labeled event fires reliably.
  pull_request_target:
    types: [labeled]

jobs:
  refuse-fork:
    if: github.event.label.name == 'agent:update-branch' && github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write

    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      GH_TOKEN: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}

    steps:
      - name: Block unsafe fork execution
        run: |
          gh pr edit "$PR_NUMBER" --remove-label "agent:update-branch" -R ${{ github.repository }} || true
          gh pr edit "$PR_NUMBER" --add-label "agent:blocked" -R ${{ github.repository }} || true
          gh pr comment "$PR_NUMBER" -R ${{ github.repository }} --body "Refused to run \`agent:update-branch\`: this workflow uses \`pull_request_target\` and cannot safely execute agent code for fork PRs. Recreate the PR from a branch in this repository, or update the branch manually."

  update-branch:
    if: github.event.label.name == 'agent:update-branch' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: agent-mutate-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: false

    permissions:
      contents: write
      pull-requests: write
      issues: write

    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      BRANCH: ${{ github.event.pull_request.head.ref }}
      BRANCH_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      BASE_REF: ${{ github.event.pull_request.base.ref }}
      GH_TOKEN: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Transition labels
        run: |
          gh pr edit "$PR_NUMBER" --remove-label "agent:update-branch" -R ${{ github.repository }} || true
          gh pr edit "$PR_NUMBER" --remove-label "agent:blocked" -R ${{ github.repository }} || true
          gh pr edit "$PR_NUMBER" --add-label "agent:in-progress" -R ${{ github.repository }}

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Ensure branch is checked out by name
        run: git checkout "$BRANCH" 2>/dev/null || git checkout -B "$BRANCH"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install engine dependencies
        run: |
          corepack enable
          cd .sandcastle/engine
          npm install
          echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Configure git identity
        run: |
          git config user.name "claude-code[bot]"
          git config user.email "claude-code[bot]@users.noreply.github.com"

      - name: Run update-branch
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.LITELLM_BASE_URL }}
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.LITELLM_MASTER_KEY }}
          OUTPUT_DIR: ${{ runner.temp }}
        run: |
          ./.sandcastle/engine/node_modules/.bin/tsx .sandcastle/run.ts update-branch \
            --pr "$PR_NUMBER" \
            --branch "$BRANCH" \
            --base-ref "$BASE_REF"

      - name: Push branch (abort cleanly if non-fast-forward)
        if: success()
        env:
          SHOULD_PUSH_FILE: ${{ runner.temp }}/should_push.txt
        run: |
          if [ ! -f "$SHOULD_PUSH_FILE" ] || [ "$(cat "$SHOULD_PUSH_FILE")" != "true" ]; then
            echo "Nothing to push."
            exit 0
          fi
          set +e
          git push --force-with-lease="refs/heads/$BRANCH:$BRANCH_HEAD_SHA" origin "$BRANCH" 2> push_err.txt
          status=$?
          set -e
          if [ $status -ne 0 ]; then
            if grep -qiE "non-fast-forward|rejected|fetch first|stale info" push_err.txt; then
              echo "Branch advanced during update-branch run." > "${RUNNER_TEMP}/failure_reason.txt"
              cat push_err.txt
              exit 1
            fi
            cat push_err.txt
            exit $status
          fi

      - name: Post PR comment
        if: success()
        env:
          COMMENT_FILE: ${{ runner.temp }}/comment.md
        run: |
          if [ -f "$COMMENT_FILE" ]; then
            gh pr comment "$PR_NUMBER" -R ${{ github.repository }} --body-file "$COMMENT_FILE"
          fi

      - name: Mark blocked on failure
        if: failure()
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          reason="(no reason file written — check workflow logs)"
          if [ -f "${RUNNER_TEMP}/failure_reason.txt" ]; then
            reason=$(cat "${RUNNER_TEMP}/failure_reason.txt")
          fi
          gh pr edit "$PR_NUMBER" --add-label "agent:blocked" -R ${{ github.repository }} || true
          gh pr comment "$PR_NUMBER" -R ${{ github.repository }} --body "$(cat <<EOF
          \`agent:update-branch\` run failed.
          **Reason:** $reason
          **Workflow run:** $RUN_URL
          Re-add \`agent:update-branch\` to retry.
          EOF
          )"

      - name: Remove in-progress label
        if: always()
        run: gh pr edit "$PR_NUMBER" --remove-label "agent:in-progress" -R ${{ github.repository }} || true
