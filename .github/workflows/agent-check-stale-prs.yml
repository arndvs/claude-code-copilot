name: "Agent: Check Stale PRs"

on:
  schedule:
    - cron: "17 9 * * 1-5"
  workflow_dispatch:

jobs:
  check-stale:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install engine dependencies
        run: |
          corepack enable
          cd .sandcastle/engine
          pnpm install --frozen-lockfile
          echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Check stale PRs
        env:
          GITHUB_TOKEN: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}
          ANTHROPIC_BASE_URL: ${{ secrets.LITELLM_BASE_URL }}
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.LITELLM_MASTER_KEY }}
        run: |
          ./.sandcastle/engine/node_modules/.bin/tsx .sandcastle/run.ts check-stale-prs
