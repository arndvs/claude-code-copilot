name: "Proxy canary"

# Continuously proves the configured proxy serves real completions for this
# repo's model — the proxy dogfooding its own health. Vendored only into
# Sandcastle installs that route through a proxy (`ctrl init-sandcastle --with-proxy`,
# the default). Requires repo secrets LITELLM_BASE_URL and LITELLM_MASTER_KEY.

on:
  schedule:
    - cron: "*/30 * * * *" # every 30 min (GitHub may delay scheduled runs)
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Probe proxy (readiness + real completion)
        id: probe
        env:
          BASE_URL: ${{ secrets.LITELLM_BASE_URL }}
          AUTH_TOKEN: ${{ secrets.LITELLM_MASTER_KEY }}
        run: |
          set -euo pipefail
          base="${BASE_URL%/}"
          if [ -z "$base" ] || [ -z "${AUTH_TOKEN:-}" ]; then
            echo "status=fail" >> "$GITHUB_OUTPUT"
            echo "detail=secrets LITELLM_BASE_URL / LITELLM_MASTER_KEY are not set on this repo" >> "$GITHUB_OUTPUT"
            echo "❌ secrets LITELLM_BASE_URL / LITELLM_MASTER_KEY are not set on this repo"
            exit 0
          fi

          # Probe model = this install's configured model (sandcastle.config.json)
          model=$(python3 -c "import json; print(json.load(open('sandcastle.config.json')).get('model',''))" 2>/dev/null || true)
          [ -n "$model" ] || model="claude-sonnet-4-6"
          echo "Probe model: $model"

          # 1) readiness (no auth, must be 200)
          code=$(curl -s -o /tmp/ready.txt -w '%{http_code}' --max-time 15 "$base/health/readiness" || true)
          echo "readiness: HTTP $code — $(cat /tmp/ready.txt 2>/dev/null || true)"
          if [ "$code" != "200" ]; then
            echo "status=fail" >> "$GITHUB_OUTPUT"
            echo "detail=readiness returned HTTP $code" >> "$GITHUB_OUTPUT"
            echo "❌ readiness returned HTTP $code"
            exit 0
          fi

          # 2) completion probe via the shared script.
          # The script always exits 0, writes status/detail/http_code to stdout
          # and GITHUB_OUTPUT. Capture stdout so the same values are available for
          # the status-summary log below (writing twice is idempotent in Actions).
          probe_script=".sandcastle/scripts/probe_completion.sh"
          if [ ! -f "$probe_script" ]; then
            echo "status=fail" >> "$GITHUB_OUTPUT"
            echo "detail=probe script missing: $probe_script" >> "$GITHUB_OUTPUT"
            echo "❌ probe script missing: $probe_script"
            exit 0
          fi
          if ! probe_out=$(
            PROBE_BASE_URL="$base" PROBE_AUTH_TOKEN="$AUTH_TOKEN" PROBE_MODEL="$model" \
            bash "$probe_script"
          ); then
            echo "status=fail" >> "$GITHUB_OUTPUT"
            echo "detail=probe script crashed before emitting outputs" >> "$GITHUB_OUTPUT"
            echo "❌ probe script crashed before emitting outputs"
            exit 0
          fi
          printf '%s\n' "$probe_out" >> "$GITHUB_OUTPUT"
          status=$(printf '%s\n' "$probe_out" | sed -n 's/^status=//p')
          detail=$(printf '%s\n' "$probe_out" | sed -n 's/^detail=//p')
          case "$status" in
            ok)       echo "✅ proxy canary passed (readiness + completion)" ;;
            degraded) echo "::warning::Proxy is up and authenticating, but upstream returned empty completions. Not paging."
                      echo "⚠️ degraded: $detail" ;;
            fail)     echo "❌ proxy canary: $detail" ;;
          esac

      - name: Open or update the canary issue on failure
        if: steps.probe.outputs.status == 'fail'
        env:
          GH_TOKEN: ${{ github.token }}
          DETAIL: ${{ steps.probe.outputs.detail }}
        run: |
          title="🚨 Proxy canary failing"
          existing=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --label proxy-canary \
            --json number --jq '.[0].number // empty' 2>/dev/null || true)
          body=$(printf '%s\n' \
            "The proxy canary failed at $(date -u +%FT%TZ)." \
            "" \
            "**Detail:** ${DETAIL}" \
            "" \
            "Probes \`/health/readiness\` then a real \`/v1/messages\` completion. No secret values are logged." \
            "" \
            "Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}")
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$GITHUB_REPOSITORY" --body "$body"
          else
            gh label create proxy-canary --repo "$GITHUB_REPOSITORY" --color B60205 \
              --description "Proxy health" 2>/dev/null || true
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" --label proxy-canary --body "$body"
          fi

      - name: Mark the job failed
        if: steps.probe.outputs.status == 'fail'
        run: exit 1
