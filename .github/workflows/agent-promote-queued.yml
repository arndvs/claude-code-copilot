name: "Agent: Promote Queued"

# When an issue closes, find every `agent:queued` issue that declared it as a
# blocker via the native GitHub issue dependency relation. If any of those
# dependents have no remaining open blockers, flip `agent:queued` to
# `agent:implement` so `agent-implement-issue.yml` picks them up.
#
# Manual application only — humans apply `agent:queued`. This workflow is the
# exit ramp, not the entrance.

on:
  issues:
    types: [closed]

jobs:
  promote:
    # Wontfix closes don't unblock anything in a meaningful sense.
    if: github.event.issue.state_reason != 'not_planned'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: agent-promote-queued-${{ github.repository }}
      cancel-in-progress: false
    permissions:
      issues: write

    env:
      CLOSED_NUMBER: ${{ github.event.issue.number }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
      AGENT_PAT: ${{ secrets.AGENT_PAT }}

    steps:
      - name: Find dependents of the closed issue
        id: dependents
        run: |
          set -euo pipefail
          owner="${GH_REPO%/*}"
          repo="${GH_REPO#*/}"
          dependents=$(gh api graphql --paginate \
            -f query='query($owner: String!, $repo: String!, $num: Int!, $cursor: String) { repository(owner: $owner, name: $repo) { issue(number: $num) { blocking(first: 100, after: $cursor) { pageInfo { hasNextPage endCursor } nodes { number state } } } } }' \
            -f owner="$owner" -f repo="$repo" -F num="$CLOSED_NUMBER" \
            | jq -cs '[.[].data.repository.issue.blocking.nodes[] | select(.state == "OPEN") | .number] | unique')
          echo "list=$dependents" >> "$GITHUB_OUTPUT"
          echo "Found dependents: $dependents"

      - name: Evaluate and promote each dependent
        if: steps.dependents.outputs.list != '[]'
        env:
          DEPENDENTS_JSON: ${{ steps.dependents.outputs.list }}
        run: |
          set -euo pipefail
          owner="${GH_REPO%/*}"
          repo="${GH_REPO#*/}"

          echo "$DEPENDENTS_JSON" | jq -r '.[]' | while read -r y; do
            echo "::group::Evaluating #$y"

            labels=$(gh api graphql --paginate \
              -f query='query($owner: String!, $repo: String!, $num: Int!, $cursor: String) { repository(owner: $owner, name: $repo) { issue(number: $num) { labels(first: 100, after: $cursor) { pageInfo { hasNextPage endCursor } nodes { name } } } } }' \
              -f owner="$owner" -f repo="$repo" -F num="$y" \
              | jq -s '[.[].data.repository.issue.labels.nodes[].name] | unique')
            blocked_by=$(gh api graphql --paginate \
              -f query='query($owner: String!, $repo: String!, $num: Int!, $cursor: String) { repository(owner: $owner, name: $repo) { issue(number: $num) { blockedBy(first: 100, after: $cursor) { pageInfo { hasNextPage endCursor } nodes { number state } } parent { number } } } }' \
              -f owner="$owner" -f repo="$repo" -F num="$y" \
              | jq -s '{parent: .[0].data.repository.issue.parent, blockedBy: [.[].data.repository.issue.blockedBy.nodes[]] }')

            has_queued=$(echo "$labels" | jq 'index("agent:queued") != null')
            has_in_progress=$(echo "$labels" | jq 'index("agent:in-progress") != null')
            parent_num=$(echo "$blocked_by" | jq -r '.parent.number // empty')
            remaining_open=$(echo "$blocked_by" | jq '[.blockedBy[] | select(.state == "OPEN")] | length')

            if [ "$has_queued" != "true" ]; then
              echo "Skip: #$y is not agent:queued"
              echo "::endgroup::"
              continue
            fi

            if [ "$has_in_progress" = "true" ]; then
              echo "Skip: #$y is agent:in-progress"
              echo "::endgroup::"
              continue
            fi

            if [ -n "$parent_num" ]; then
              echo "Refuse: #$y is a sub-issue of #$parent_num"
              gh issue edit "$y" --remove-label "agent:queued" || true
              gh issue edit "$y" --add-label "agent:blocked" || true
              gh issue comment "$y" --body "Refused to promote: this is a sub-issue of #${parent_num}. \`agent:queued\` is not meaningful on sub-issues — label the parent PRD instead. Cleared \`agent:queued\` and added \`agent:blocked\`."
              echo "::endgroup::"
              continue
            fi

            if [ "$remaining_open" -gt 0 ]; then
              echo "Skip: #$y still has $remaining_open open blocker(s)"
              echo "::endgroup::"
              continue
            fi

            still_queued=$(gh issue view "$y" --json labels --jq '[.labels[].name] | index("agent:queued") != null')
            if [ "$still_queued" != "true" ]; then
              echo "Skip: #$y no longer has agent:queued (lost race)"
              echo "::endgroup::"
              continue
            fi

            echo "Promote: #$y"
            if [ -z "$AGENT_PAT" ]; then
              echo "Refuse: AGENT_PAT is required to add agent:implement because GITHUB_TOKEN-created labels do not trigger workflows."
              gh issue edit "$y" --remove-label "agent:queued" || true
              gh issue edit "$y" --add-label "agent:blocked" || true
              gh issue comment "$y" --body "Refused to promote: \`AGENT_PAT\` is required to add \`agent:implement\` because labels created with \`GITHUB_TOKEN\` do not trigger workflows. Configure \`AGENT_PAT\`, then remove \`agent:blocked\` and apply \`agent:implement\` manually."
              echo "::endgroup::"
              continue
            fi

            gh issue edit "$y" --remove-label "agent:queued"
            gh issue comment "$y" --body "Unblocked by #${CLOSED_NUMBER} closing — promoting from \`agent:queued\` to \`agent:implement\`."

            set +e
            GH_TOKEN="$AGENT_PAT" gh issue edit "$y" --add-label "agent:implement"
            status=$?
            set -e
            if [ "$status" -ne 0 ]; then
              echo "AGENT_PAT add-label failed (status $status); marking blocked."
              gh issue edit "$y" --add-label "agent:blocked" || true
              gh issue comment "$y" --body "Promotion failed: \`AGENT_PAT\` could not add \`agent:implement\` (status ${status}). Remove \`agent:blocked\` and apply \`agent:implement\` manually after fixing the token."
            fi

            echo "::endgroup::"
          done
