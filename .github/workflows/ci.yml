name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install pyyaml pytest fastapi httpx

      # Convention: every shell script matching scripts/test_*.sh, tests/test_*.sh, or the
      # vendored .sandcastle/scripts/test_*.sh is auto-discovered and run here — add a new
      # structural-validation test by creating a script with that name, no ci.yml edit
      # required. Scripts must exit 0 on success and non-zero on failure. Docker-dependent
      # tests should guard with `command -v docker` and skip gracefully when it is unavailable.
      - name: Structural validation tests (shell)
        run: |
          set -euo pipefail
          failed=0
          for script in scripts/test_*.sh tests/test_*.sh .sandcastle/scripts/test_*.sh; do
            [ -f "$script" ] || continue
            echo "── $script ──"
            if bash "$script"; then
              echo "✅ $script passed"
            else
              echo "❌ $script failed"
              failed=1
            fi
            echo ""
          done
          exit "$failed"

      - name: Run Python unit tests
        run: pytest tests/ -q --tb=short

      - name: Validate litellm_config.yaml parses
        run: |
          python3 -c "import yaml; yaml.safe_load(open('litellm_config.yaml')); print('litellm_config.yaml OK')"

      - name: Validate compose config
        run: |
          # docker-compose.yml declares `env_file: .env`; newer Docker Compose hard-errors
          # when it is missing. CI has no secrets, so a transient stub satisfies the
          # file-existence check. Remove it on exit so it never enters the build context.
          touch .env
          trap 'rm -f .env' EXIT
          docker compose -f docker-compose.yml config >/dev/null && echo "base compose OK (DB-less)"
          if [ -f docker-compose.db.yml ]; then
            docker compose -f docker-compose.yml -f docker-compose.db.yml config >/dev/null \
              && echo "db overlay OK"
          fi

      - name: Docker build (proves the proxy image builds)
        run: docker build -t claude-code-copilot-proxy:ci .

      - name: Shellcheck
        continue-on-error: true
        run: |
          sudo apt-get update -qq && sudo apt-get install -y shellcheck -qq
          shellcheck scripts/*.sh start_proxy.sh
