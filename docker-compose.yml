# Default stack is DB-LESS — it mirrors the documented single-container hosted
# deploy. The proxy needs no database for master-key auth + static model routing
# (see litellm_config.yaml). To enable the OPTIONAL spend-tracking Postgres,
# layer the overlay:
#   docker compose -f docker-compose.yml -f docker-compose.db.yml up --build
services:
  proxy:
    build:
      context: .
      args:
        BUILD_SHA: ${BUILD_SHA:-unknown}
        BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-unknown}
    ports:
      - "127.0.0.1:${LITELLM_PORT:-4000}:4000"
    env_file: .env
    environment:
      LITELLM_LOCAL_MODEL_COST_MAP: "true"
    volumes:
      # Mount cached GitHub Copilot OAuth token
      - ${HOME}/.config/litellm/github_copilot:/root/.config/litellm/github_copilot:rw
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request;\ntry: urllib.request.urlopen('http://localhost:4000/health/readiness', timeout=3)\nexcept Exception: sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3
